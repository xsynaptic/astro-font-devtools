packages:
  - packages/*
  - playground

# For local installs use the workspace version; StackBlitz should still resolve to the published package
overrides:
  '@xsynaptic/astro-font-devtools': workspace:*

allowBuilds:
  esbuild: true
  sharp: true

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@xsynaptic/astro-font-devtools'
